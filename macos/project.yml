name: Jetlag
options:
  bundleIdPrefix: com.daniellawrence
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  minimumXcodeGenVersion: "2.38.0"
packages:
  Yams:
    url: https://github.com/jpsim/Yams
    from: "5.0.0"
targets:
  Jetlag:
    type: application
    platform: macOS
    sources:
      - Sources
    dependencies:
      - package: Yams
      - sdk: MapKit.framework
      - sdk: CoreLocation.framework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.daniellawrence.Jetlag
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.video
        INFOPLIST_KEY_NSHumanReadableCopyright: "© 2026 Daniel Lawrence"
        CODE_SIGN_ENTITLEMENTS: Sources/App.entitlements
    postBuildScripts:
      - name: Bundle scripts
        script: |
          set -e
          DEST="${BUILT_PRODUCTS_DIR}/${PRODUCT_NAME}.app/Contents/Resources/scripts"
          rm -rf "$DEST"
          cp -r "${SRCROOT}/../scripts/" "$DEST"
          rm -rf "$DEST/site-packages"
          python3 -m pip install --quiet --target "$DEST/site-packages" -r "$DEST/requirements.txt"

          # Build jetlag-metadata Swift CLI and install into bundle
          METADATA_PKG="${SRCROOT}/Sources/Tools/jetlag-metadata"
          if [ -d "$METADATA_PKG" ]; then
            swift build -c release --package-path "$METADATA_PKG" 2>&1
            cp "$METADATA_PKG/.build/release/jetlag-metadata" "$DEST/tools/jetlag-metadata"
          fi

          # Verify vendored tools are present (copied by cp -r above)
          for tool in exiftool tag ffprobe gyroflow jetlag-metadata; do
            if [ ! -f "$DEST/tools/$tool" ]; then
              echo "error: scripts/tools/$tool missing — run scripts/tools/download-${tool}.sh or scripts/tools/build-jetlag-metadata.sh or see scripts/tools/README" >&2
              exit 1
            fi
          done
  JetlagTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - Tests
    dependencies:
      - target: Jetlag
    settings:
      base:
        SWIFT_VERSION: "5.9"
        GENERATE_INFOPLIST_FILE: YES
