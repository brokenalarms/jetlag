name: CI

on:
  pull_request:

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      scripts: ${{ steps.filter.outputs.scripts }}
    steps:
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            scripts:
              - 'scripts/**'

  scripts-test:
    needs: changes
    if: needs.changes.outputs.scripts == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Cache apt packages
        uses: actions/cache@v4
        id: cache-apt
        with:
          path: ~/apt-cache
          key: apt-${{ runner.os }}-${{ hashFiles('.github/workflows/ci.yml') }}

      - name: Install system tools
        run: |
          if [ -d ~/apt-cache ]; then
            sudo cp ~/apt-cache/*.deb /var/cache/apt/archives/ 2>/dev/null || true
          fi
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg libimage-exiftool-perl
          mkdir -p ~/apt-cache
          sudo cp /var/cache/apt/archives/*.deb ~/apt-cache/ 2>/dev/null || true

      - name: Install Python deps
        run: pip install -r scripts/requirements.txt

      - name: Record perf baseline from main
        run: |
          git ls-tree --name-only origin/main -- scripts/*.py scripts/*.sh scripts/lib/ | xargs -r git checkout origin/main --
          pytest scripts/tests/test_performance.py --perf-baseline --perf-baseline-file /tmp/perf_baseline.json -v -s
          git checkout ${{ github.sha }} -- scripts/

      - name: Run tests
        run: pytest scripts/tests/ -x --perf-baseline-file /tmp/perf_baseline.json --perf-results-file /tmp/perf_results.json

      - name: Performance summary
        if: always()
        run: python3 .github/scripts/perf_summary.py

  gate:
    needs: [scripts-test]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - run: |
          [[ "${{ needs.scripts-test.result }}" == "failure" ]] && exit 1
          exit 0
