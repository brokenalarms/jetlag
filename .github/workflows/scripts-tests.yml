name: scripts tests

on:
  pull_request:
    paths:
      - "scripts/**"
      - ".github/workflows/scripts-tests.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Cache apt packages
        uses: actions/cache@v4
        id: cache-apt
        with:
          path: ~/apt-cache
          key: apt-${{ runner.os }}-${{ hashFiles('.github/workflows/scripts-tests.yml') }}

      - name: Install system tools
        run: |
          if [ -d ~/apt-cache ]; then
            sudo cp ~/apt-cache/*.deb /var/cache/apt/archives/ 2>/dev/null || true
          fi
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg libimage-exiftool-perl
          mkdir -p ~/apt-cache
          sudo cp /var/cache/apt/archives/*.deb ~/apt-cache/ 2>/dev/null || true

      - name: Install Python deps
        run: pip install -r scripts/requirements.txt

      - name: Run tests (excluding perf)
        run: pytest scripts/tests/ -x -v --ignore=scripts/tests/test_performance.py
