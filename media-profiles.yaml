gyroflow:
  binary: /Applications/Gyroflow.app/Contents/MacOS/gyroflow
  preset:
    stabilization:
      max_zoom: 105.0
      adaptive_zoom_window: 15.0
      adaptive_zoom_method: 1
backup_config:
  local_base_path: /Volumes/
  remote_base_path: /volume1/Backup/ChronoSync/
profiles:
  insta360:
    type: video
    source_dir: /Volumes/Untitled/DCIM
    import_dir: /Volumes/Extreme GRN/Videos/Source Video/Insta360/Import
    ready_dir: /Volumes/Extreme GRN/Videos/Source Video/Insta360/Ready
    backup_enabled: true
    gyroflow_enabled: false
    backup_dir: /Volumes/Extreme GRN/Videos/Source Video/Insta360
    backup_exclude_subdirs:
    - Exports
    tags:
    - insta-360-x4
    exif:
      make: Insta360
      model: X4
    file_extensions: [.mp4, .insv]
    companion_extensions: [.lrv, .thm, .list]
