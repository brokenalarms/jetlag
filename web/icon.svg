<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#161b22;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="jetGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e6edf3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b949e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="tcGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#58a6ff;stop-opacity:0.2" />
      <stop offset="50%" style="stop-color:#58a6ff;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#58a6ff;stop-opacity:0.2" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="jetGlow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background rounded rect -->
  <rect width="512" height="512" rx="100" fill="url(#bgGrad)"/>

  <!-- Timecode track line -->
  <rect x="48" y="308" width="416" height="2" rx="1" fill="url(#tcGrad)"/>

  <!-- Tick marks on timeline -->
  <rect x="48"  y="298" width="2" height="12" rx="1" fill="#58a6ff" opacity="0.5"/>
  <rect x="152" y="298" width="2" height="12" rx="1" fill="#58a6ff" opacity="0.5"/>
  <rect x="256" y="298" width="2" height="12" rx="1" fill="#58a6ff" opacity="0.5"/>
  <rect x="360" y="298" width="2" height="12" rx="1" fill="#58a6ff" opacity="0.5"/>
  <rect x="462" y="298" width="2" height="12" rx="1" fill="#58a6ff" opacity="0.5"/>

  <!-- Playhead at ~60% -->
  <rect x="282" y="285" width="2" height="38" rx="1" fill="#f78166" opacity="0.9"/>
  <polygon points="276,285 290,285 283,294" fill="#f78166" opacity="0.9"/>

  <!-- Timecode display box -->
  <rect x="144" y="340" width="224" height="52" rx="8" fill="#0d1117" stroke="#30363d" stroke-width="1.5"/>
  <text x="256" y="376"
    font-family="'SF Mono', 'Fira Code', 'Courier New', monospace"
    font-size="30"
    font-weight="600"
    fill="#58a6ff"
    text-anchor="middle"
    filter="url(#glow)"
    letter-spacing="2">01:42:07:14</text>

  <!-- Jet body — pointing upper-right (rotated 30°) -->
  <g transform="translate(256,190) rotate(-32) scale(1.15)" filter="url(#jetGlow)">
    <!-- Main fuselage -->
    <ellipse cx="0" cy="0" rx="80" ry="16" fill="url(#jetGrad)"/>
    <!-- Nose cone -->
    <path d="M80,0 Q105,-6 120,0 Q105,6 80,0Z" fill="#c9d1d9"/>
    <!-- Tail fin -->
    <path d="M-70,-16 L-55,0 L-70,0Z" fill="#8b949e"/>
    <!-- Top stabiliser -->
    <path d="M-60,-16 Q-30,-38 -10,-16Z" fill="#8b949e"/>
    <!-- Wings -->
    <path d="M-20,-16 Q30,-62 55,-16Z" fill="#c9d1d9"/>
    <path d="M-20,16  Q30,62  55,16Z"  fill="#c9d1d9"/>
    <!-- Engine pods -->
    <ellipse cx="20" cy="-24" rx="18" ry="7" fill="#6e7681"/>
    <ellipse cx="20" cy="24"  rx="18" ry="7" fill="#6e7681"/>
    <!-- Engine exhaust glow -->
    <ellipse cx="-78" cy="0" rx="10" ry="5" fill="#ff7b72" opacity="0.7"/>
  </g>

  <!-- Contrail / wake lines -->
  <line x1="90" y1="235" x2="148" y2="212" stroke="#8b949e" stroke-width="1.5" opacity="0.35" stroke-linecap="round"/>
  <line x1="78" y1="243" x2="140" y2="219" stroke="#8b949e" stroke-width="1"   opacity="0.2"  stroke-linecap="round"/>
</svg>
